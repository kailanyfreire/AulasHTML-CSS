<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="images/botao-play.png" type="image/png">
    <title>HTML e CSS</title>

    <style>
        body {
            text-align: center;
            background-color: rgb(171, 212, 248);
        }

        iframe {
            box-shadow: 4px 8px 15px 0px rgba(0, 0, 0, 0.3);
        }

        .back {
            width: 25px;
        }
    </style>
</head>


<body>
    <h1>Curso de HTML5 e CSS3</h1>
    <iframe width="640" height="360" src="https://www.youtube.com/embed/Ejkb_YpuHWs?si=-KkAUbgeIQIk9Hz-"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <a href="https://www.youtube.com/cursoemvideo" target="_blank" rel="noopener">
        <p>Assista mais, clicando aqui</p>
    </a>
    <a href="index.html"><img class="back" src="images/seta-curva.png" alt="Voltar"></a>
</body>

</html>
