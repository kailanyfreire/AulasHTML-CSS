<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="bandeira.png" type="image/png">
    <title>Tags HTML</title>
</head>
<body>
    <H1>Tags em HTML</H1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>
    <ul>
        <li><abbr type="definition" title="use a tag &lt;p&gt;" type="">Parágrafos</abbr></li>
        <li><abbr type="definition" title="use a tag &lt;h1&gt; até &lt;h6&gt;">Títulos</abbr></li>
        <li><abbr type="definition" title="use a tag &lt;img&gt;">Imagens</abbr></li>
        <li><abbr type="definition" title="use a tag &lt;a&gt;">Links</abbr></li>
        <li><abbr type="definition" title="use a tag &lt;ul&gt;">Lista não ordenada</abbr></li>
        <li><abbr type="definition" title="use a tag &lt;ol&gt;">Lista ordenada</abbr></li>
        <li><abbr type="definition" title="use a tag &lt;code&gt;">Código-fonte</abbr></li>
    </ul>
</body>
</html>
